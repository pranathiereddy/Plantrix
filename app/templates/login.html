{% extends 'layout.html' %}

{% block body %}
<section class="w3l-contact py-5">
  <div class="container py-md-3">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card bg-dark text-white border-secondary">
          <div class="card-body p-4">
            <h2 class="text-center mb-4 text-white">Login</h2>

            {% if error %}
            <div class="alert alert-danger" role="alert">
              {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="/login">
              <div class="form-group">
                <label for="email">Email address</label>
                <input type="email" class="form-control bg-secondary text-white border-dark" id="email" name="email"
                  placeholder="Enter email" required>
              </div>
              <div class="form-group">
                <label for="password">Password</label>
                <input type="password" class="form-control bg-secondary text-white border-dark" id="password"
                  name="password" placeholder="Password" required>
              </div>
              <button type="submit" class="btn btn-success btn-block mt-3">Login</button>
            </form>

            <p class="text-center mt-3 mb-0">
              Don't have an account? <a href="/register" class="text-success">Register</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
